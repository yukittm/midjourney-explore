name: validate-queue
on:
  push:
    paths: ["automation/**", ".github/workflows/validate.yml"]
  pull_request:
    paths: ["automation/**", ".github/workflows/validate.yml"]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r automation/requirements.txt
      - name: Validate the queue (blocks bad posts at approval time)
        run: python automation/validate.py
      - name: Unit tests
        run: PYTHONPATH=automation python -m unittest discover -s automation/tests -p "test_*.py"
