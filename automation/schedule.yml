# Posting cadence — the DERIVED calendar is a pure function of (approved posts + this file).
# `python automation/plan.py` assigns each approved auto-mode post to the next free slot here.
# This file is editorial (version-worthy); change it to reshape the calendar, then re-run plan.

timezone: "Asia/Tokyo"          # IANA tz; slot times below are wall-clock in this zone (DST-correct)

slots:                          # one post is placed per slot, earliest-free first → 2 posts/day
  - window: ["08:00", "13:00"]  # morning slot — DETERMINISTIC-random time inside this JST window
  - window: ["16:30", "23:30"]  # evening slot — kept ≥3h after the morning one (rate.min_gap_minutes)
                                #   Both avoid JST deep night, read human (not on the dot); the chosen
                                #   times are written into publish_at (auditable). Use `time: "19:00"`
                                #   for a fixed slot instead. Drop to one slot for 1 post/day.
    # days: [mon, tue, wed, thu, fri, sat, sun]   # optional — default: every day
    # media_types: [image, carousel, reels]       # optional — default: any type

rate:
  max_per_24h: 22               # self-imposed cap (Meta's real content-publishing limit is ~100/24h)
  min_gap_minutes: 180          # never schedule two posts closer than this

horizon_days: 21                # how far ahead the planner will fill
blackout: []                    # YYYY-MM-DD dates to skip, e.g. [2026-12-31]

# jitter: {min_minutes: -15, max_minutes: 30}   # optional per-post nudge for a FIXED `time:` slot
#                                                 (the `window:` slot above already spreads the time)
